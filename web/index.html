<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NuiPet</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="stage" aria-label="NuiPet 桌宠">
      <button id="pet" class="pet" type="button" aria-label="鹿弈Nui"></button>
      <div id="bubble" class="bubble" hidden></div>
      <nav id="menu" class="menu" aria-label="桌宠菜单" hidden>
        <div id="actionMenu" class="menu-actions"></div>
        <div class="menu-row">
          <button type="button" data-scale="-">-</button>
          <span id="scaleLabel">100%</span>
          <button type="button" data-scale="+">+</button>
        </div>
        <button id="pinToggle" type="button">置顶</button>
        <button id="quit" type="button">退出</button>
      </nav>
    </main>
    <script src="./main.js"></script>
  </body>
</html>
